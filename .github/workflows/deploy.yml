name: Build and publish to main

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Write Mapbox token for Vite build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
        run: |
          if [ -z "$VITE_MAPBOX_TOKEN" ]; then
            echo "::warning::VITE_MAPBOX_TOKEN secret is empty — map may not load on the live site"
          else
            echo "VITE_MAPBOX_TOKEN=$VITE_MAPBOX_TOKEN" > .env.production
            echo "Mapbox token loaded for build (${#VITE_MAPBOX_TOKEN} chars)"
          fi

      - name: Build for GitHub Pages
        env:
          GITHUB_PAGES: 'true'
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
        run: npm run build

      - name: SPA fallback for client-side routes
        run: cp dist/index.html dist/404.html

      - name: Commit built assets to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist
          git diff --staged --quiet && echo "No dist changes" && exit 0
          git commit -m "chore: update production build in dist/"
          git push
